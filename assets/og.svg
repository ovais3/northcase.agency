<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdfbf8"/>
  <rect x="0" y="0" width="1200" height="630" fill="#f6efe6" opacity="0.4"/>

  <!-- faint compass-funnel motif on the right -->
  <g transform="translate(900,315)" opacity="0.9">
    <circle r="240" fill="none" stroke="#b0a496" stroke-width="1.4" opacity="0.5"/>
    <circle r="176" fill="none" stroke="rgba(42,33,27,.2)" stroke-width="1.4"/>
    <circle r="116" fill="none" stroke="rgba(42,33,27,.2)" stroke-width="1.4"/>
    <circle r="64" fill="none" stroke="#f0935f" stroke-width="1.8"/>
    <circle cx="0" cy="-176" r="4" fill="#b0a496"/>
    <circle cx="150" cy="-92" r="4" fill="#5b4a3e"/>
    <circle cx="-130" cy="78" r="4.5" fill="#f0935f"/>
    <circle cx="60" cy="100" r="5" fill="#e85d04"/>
    <circle r="52" fill="#fde3cf" opacity="0.6"/>
    <path d="M0 -40 L9 0 L0 28 L-9 0 Z" fill="#e85d04"/>
    <path d="M-40 0 L0 9 L40 0 L0 -9 Z" fill="#2a211b"/>
    <circle r="5" fill="#fdfbf8"/>
    <circle r="2.2" fill="#e85d04"/>
    <text x="0" y="-256" font-family="JetBrains Mono, monospace" font-size="22" font-weight="500" fill="#e85d04" text-anchor="middle">N</text>
  </g>

  <!-- wordmark -->
  <g transform="translate(96,150)">
    <circle cx="22" cy="22" r="20" fill="none" stroke="#b0a496" stroke-width="2.4"/>
    <path d="M22 4 L27 22 L22 28 L17 22 Z" fill="#e85d04"/>
    <path d="M40 22 L22 27 L16 22 L22 17 Z" fill="#2a211b"/>
    <text x="58" y="34" font-family="Montserrat, sans-serif" font-size="34" font-weight="800" fill="#2a211b" letter-spacing="-0.5">Northcast</text>
  </g>

  <!-- headline -->
  <text x="96" y="320" font-family="Montserrat, sans-serif" font-size="68" font-weight="800" fill="#2a211b" letter-spacing="-2">More of the <tspan fill="#e85d04">right</tspan></text>
  <text x="96" y="394" font-family="Montserrat, sans-serif" font-size="68" font-weight="800" fill="#2a211b" letter-spacing="-2"><tspan fill="#e85d04">clients.</tspan> Without the chasing.</text>

  <!-- subline -->
  <text x="98" y="470" font-family="Hanken Grotesk, sans-serif" font-size="26" font-weight="500" fill="#5b4a3e">A modern GTM engine for B2B founders.</text>

  <rect x="96" y="520" width="220" height="6" rx="3" fill="#e85d04"/>
</svg>
